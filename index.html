<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RO Daily Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--panel:#1e293b;
--text:#ffffff;
--tableHeader:#1f2937;
--accent:#3b82f6;
--done:#22c55e33;
--notyet:#ef444433;
}

.light{
--bg:#f1f5f9;
--panel:#ffffff;
--text:#111;
--tableHeader:#e2e8f0;
}

body{
font-family:Inter,sans-serif;
margin:0;
background:var(--bg);
color:var(--text);
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.panel{
background:var(--panel);
padding:16px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:var(--accent);
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:15px;
}

.timer{
font-weight:600;
}

.clock{
font-size:16px;
}

.tableWrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:var(--tableHeader);
padding:10px;
}

td{
padding:8px;
text-align:center;
cursor:pointer;
}

.done{background:var(--done);}
.notyet{background:var(--notyet);}

.charCell{
text-align:left;
font-weight:600;
}

.warning{color:#f59e0b;}
.danger{color:#ef4444;}

dialog{
border:none;
border-radius:10px;
padding:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<button onclick="toggleTheme()">🌙/☀</button>
</div>

<div class="timer">
<span id="timerIcon">⏸</span>
<span id="timerDisplay">00:00:00.000</span>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>
</div>

<div class="clock" id="clock"></div>

</div>

<div class="panel">

<h2>RO デイリー管理</h2>

<button onclick="openCharDialog()">キャラ追加</button>
<button onclick="openQuestDialog()">クエスト追加</button>

<div class="tableWrap">
<table>

<thead>
<tr id="headerRow">
<th>キャラ</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>
</div>

</div>

<div class="panel">

<h3>Ping Monitor</h3>

<button onclick="togglePing()" id="pingToggle">Ping ON</button>

<div id="pingValue">-- ms</div>

<div>
平均: <span id="pingAvg">-</span> ms　
最大: <span id="pingMax">-</span> ms
</div>

<canvas id="pingChart" height="120"></canvas>

</div>

<!-- キャラ追加 -->

<dialog id="charDialog">

<h3>キャラ追加</h3>

<input id="charName" placeholder="キャラ名"><br>
<input id="charLevel" placeholder="Lv"><br>

<button onclick="addChar()">追加</button>
<button onclick="closeDialog('charDialog')">閉じる</button>

</dialog>

<!-- クエスト追加 -->

<dialog id="questDialog">

<h3>クエスト追加</h3>

<input id="questName" placeholder="クエスト名"><br>

<select id="questType">
<option value="daily">daily</option>
<option value="three">3day</option>
<option value="weekly">weekly</option>
</select><br>

<button onclick="addQuest()">追加</button>
<button onclick="closeDialog('questDialog')">閉じる</button>

</dialog>

<script>

/* 保存 */

function load(){
return JSON.parse(localStorage.getItem("roTracker")||'{"chars":{},"quests":[]}')
}

function save(){
localStorage.setItem("roTracker",JSON.stringify(data))
}

let data=load()

/* テーマ */

function toggleTheme(){
document.body.classList.toggle("light")
}

/* 時計 */

function updateClock(){
document.getElementById("clock").textContent=new Date().toLocaleTimeString()
}

setInterval(updateClock,1000)
updateClock()

/* タイマー */

let timerStart=0
let timerElapsed=0
let timerRunning=false

function startTimer(){

if(timerRunning)return

timerRunning=true
timerStart=performance.now()-timerElapsed

document.getElementById("timerIcon").textContent="▶"

requestAnimationFrame(timerLoop)

}

function stopTimer(){

timerRunning=false
document.getElementById("timerIcon").textContent="⏸"

}

function resetTimer(){

timerRunning=false
timerElapsed=0
updateTimer()

}

function timerLoop(){

if(!timerRunning)return

timerElapsed=performance.now()-timerStart

updateTimer()

requestAnimationFrame(timerLoop)

}

function updateTimer(){

let ms=Math.floor(timerElapsed)

let s=Math.floor(ms/1000)

let milli=ms%1000

let h=Math.floor(s/3600)
let m=Math.floor((s%3600)/60)
let sec=s%60

document.getElementById("timerDisplay").textContent=

String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(sec).padStart(2,"0")+"."+
String(milli).padStart(3,"0")

}

/* ダイアログ */

function openCharDialog(){
document.getElementById("charDialog").showModal()
}

function openQuestDialog(){
document.getElementById("questDialog").showModal()
}

function closeDialog(id){
document.getElementById(id).close()
}

/* キャラ */

function addChar(){

let name=document.getElementById("charName").value.trim()
let level=document.getElementById("charLevel").value.trim()

if(!name)return

data.chars[name]={level:level,quests:{}}

save()
render()

closeDialog("charDialog")

}

function deleteChar(name){

if(!confirm("削除？"))return

delete data.chars[name]

save()
render()

}

/* クエスト */

function addQuest(){

let name=document.getElementById("questName").value.trim()
let type=document.getElementById("questType").value

if(!name)return

data.quests.push({id:Date.now(),name,type})

save()
render()

closeDialog("questDialog")

}

function deleteQuest(id){

if(!confirm("削除？"))return

data.quests=data.quests.filter(q=>q.id!==id)

save()
render()

}

/* 判定 */

const RESET=5

function baseDaily(){

let n=new Date()

if(n.getHours()<RESET)n.setDate(n.getDate()-1)

n.setHours(RESET,0,0,0)

return n

}

function isDaily(t){
return t && new Date(t)>=baseDaily()
}

function resetCount(t){

if(!t)return 999

let c=0
let now=new Date()
let d=new Date(t)

while(true){

let next=new Date(d)
next.setHours(RESET,0,0,0)

if(next<=d)next.setDate(next.getDate()+1)

if(next>now)break

c++
d=next

}

return c

}

function isThree(t){
return resetCount(t)<3
}

function isWeekly(t){

if(!t)return false

let now=new Date()

let d=new Date(now)

let day=d.getDay()

let diff=(day<2?day+5:day-2)

d.setDate(d.getDate()-diff)

d.setHours(RESET,0,0,0)

return new Date(t)>=d

}

/* トグル */

function toggle(char,id){

let v=data.chars[char].quests[id]

if(v){
delete data.chars[char].quests[id]
}else{
data.chars[char].quests[id]=new Date().toISOString()
}

save()
render()

}

/* 描画 */

function render(){

let header=document.getElementById("headerRow")
header.innerHTML="<th>キャラ</th>"

data.quests.forEach(q=>{

let th=document.createElement("th")

th.innerHTML=
q.name+
` <button onclick="deleteQuest(${q.id})">🗑</button>`

header.appendChild(th)

})

let body=document.getElementById("body")

body.innerHTML=""

for(let char in data.chars){

let tr=document.createElement("tr")

let td=document.createElement("td")

td.className="charCell"

td.innerHTML=
char+" Lv"+data.chars[char].level+
` <button onclick="deleteChar('${char}')">🗑</button>`

tr.appendChild(td)

data.quests.forEach(q=>{

let cell=document.createElement("td")

let time=data.chars[char].quests[q.id]

let done=false

if(q.type==="daily")done=isDaily(time)
if(q.type==="three")done=isThree(time)
if(q.type==="weekly")done=isWeekly(time)

cell.className=done?"done":"notyet"

cell.textContent=done?"済":"未"

cell.onclick=()=>toggle(char,q.id)

tr.appendChild(cell)

})

body.appendChild(tr)

}

}

/* Ping */

let pingEnabled=true
let pingHistory=[]

const ctx=document.getElementById("pingChart")

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Ping (ms)',
data:[],
borderColor:'#3b82f6',
tension:0.2
}]
},
options:{animation:false}
})

function togglePing(){

pingEnabled=!pingEnabled

document.getElementById("pingToggle").textContent=
pingEnabled?"Ping ON":"Ping OFF"

}

async function ping(){

if(!pingEnabled)return

const start=performance.now()

try{

await fetch("https://www.google.com/generate_204",{mode:"no-cors"})

let latency=Math.round(performance.now()-start)

pingHistory.push(latency)

if(pingHistory.length>120)pingHistory.shift()

let avg=Math.round(pingHistory.reduce((a,b)=>a+b,0)/pingHistory.length)
let max=Math.max(...pingHistory)

document.getElementById("pingAvg").textContent=avg
document.getElementById("pingMax").textContent=max

chart.data.labels=pingHistory.map((_,i)=>i)
chart.data.datasets[0].data=pingHistory

chart.update()

let label=latency+" ms"
let cls=""

if(latency>200){label="🚨 "+latency+" ms";cls="danger"}
else if(latency>100){label="⚠ "+latency+" ms";cls="warning"}

let el=document.getElementById("pingValue")

el.textContent=label
el.className=cls

}catch{
document.getElementById("pingValue").textContent="timeout"
}

}

setInterval(ping,1000)

render()

</script>

</body>
</html>
