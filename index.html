<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RO Daily Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--panel:#1e293b;
--text:#fff;
--accent:#3b82f6;
--done:#22c55e55;
--notyet:#ef444455;
}
.light{
--bg:#f1f5f9;
--panel:#fff;
--text:#111;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
}

/* ヘッダ */
header{
position:sticky;
top:0;
background:var(--panel);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

button{
margin:2px;
padding:6px 10px;
cursor:pointer;
}

.container{
padding:10px;
}

/* テーブル */
.tableWrap{overflow:auto;}
table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #444;padding:6px;text-align:center;}
.done{background:var(--done);}
.notyet{background:var(--notyet);}

/* dialog */
dialog{padding:20px;border-radius:10px;}
</style>
</head>

<body>

<header>

<div>
<button onclick="toggleTheme()">🌙</button>
<button onclick="exportURL()">URL出力</button>
</div>

<div>
<span id="timer">00:00:00.000</span>
<button onclick="startTimer()">START</button>
<button onclick="stopTimer()">STOP</button>
<button onclick="resetTimer()">RESET</button>
</div>

<div id="clock"></div>

</header>

<div class="container">

<h3>RO デイリー管理</h3>

<button onclick="openChar()">キャラ編集</button>
<button onclick="openQuest()">クエスト編集</button>

<div class="tableWrap">
<table id="table"></table>
</div>

<h3>Ping Monitor</h3>

<button onclick="togglePing()">ON/OFF</button>

<div>
現在:<span id="pingNow">-</span>
平均:<span id="pingAvg">-</span>
最大:<span id="pingMax">-</span>
</div>

<canvas id="chart"></canvas>

<h3>URL共有</h3>
<textarea id="urlBox" style="width:100%;height:80px"></textarea>

</div>

<!-- dialogs -->
<dialog id="charDialog">
<input id="charName" placeholder="キャラ名"><br>
<input id="charLv" placeholder="Lv"><br>
<button onclick="saveChar()">SAVE</button>
<button onclick="closeDialog('charDialog')">CANCEL</button>
</dialog>

<dialog id="questDialog">
<input id="questName" placeholder="クエスト名"><br>
<select id="questType">
<option value="daily">Daily</option>
<option value="three">3Days</option>
<option value="weekly">Weekly</option>
</select>
<br>
<button onclick="saveQuest()">SAVE</button>
<button onclick="closeDialog('questDialog')">CANCEL</button>
</dialog>

<script>

/* データ */
let data=JSON.parse(localStorage.getItem("data")||'{"chars":[],"quests":[],"log":{}}')

function save(){localStorage.setItem("data",JSON.stringify(data))}

/* テーマ */
function toggleTheme(){document.body.classList.toggle("light")}

/* 時計 */
setInterval(()=>clock.textContent=new Date().toLocaleTimeString(),1000)

/* タイマー */
let t0=0,elapsed=0,run=false
function startTimer(){if(run)return;run=true;t0=performance.now()-elapsed;loop()}
function stopTimer(){run=false}
function resetTimer(){run=false;elapsed=0;drawTimer()}
function loop(){
if(!run)return
elapsed=performance.now()-t0
drawTimer()
requestAnimationFrame(loop)
}
function drawTimer(){
let ms=elapsed|0
let s=(ms/1000)|0
timer.textContent=
String((s/3600)|0).padStart(2,"0")+":"+
String(((s%3600)/60)|0).padStart(2,"0")+":"+
String(s%60).padStart(2,"0")+"."+
String(ms%1000).padStart(3,"0")
}

/* ダイアログ */
function openChar(){charDialog.showModal()}
function openQuest(){questDialog.showModal()}
function closeDialog(id){document.getElementById(id).close()}

/* キャラ */
function saveChar(){
let n=charName.value.trim()
if(data.chars.find(c=>c.name===n)){alert("重複");return}
data.chars.push({name:n,lv:charLv.value})
save();render();closeDialog("charDialog")
}

/* クエスト */
function saveQuest(){
data.quests.push({id:Date.now(),name:questName.value,type:questType.value})
save();render();closeDialog("questDialog")
}

/* トグル */
function toggle(c,q){
let k=c+"_"+q
data.log[k]=data.log[k]?null:Date.now()
save();render()
}

/* 判定 */
function isDone(q,t){
if(!t)return false
let now=new Date()
if(q.type==="daily"){
let d=new Date();d.setHours(5,0,0,0)
if(now<d)d.setDate(d.getDate()-1)
return new Date(t)>=d
}
if(q.type==="three"){
let diff=(now-t)/(1000*60*60*24)
return diff<3
}
if(q.type==="weekly"){
let d=new Date()
let day=d.getDay()
let diff=(day<2?day+5:day-2)
d.setDate(d.getDate()-diff)
d.setHours(12,0,0,0)
return new Date(t)>=d
}
}

/* 描画 */
function render(){
let html="<tr><th></th>"
data.chars.forEach(c=>{
html+=`<th draggable="true">${c.name}(Lv${c.lv})<button onclick="delChar('${c.name}')">x</button></th>`
})
html+="</tr>"

data.quests.forEach(q=>{
html+=`<tr><th>${q.name}<button onclick="delQuest(${q.id})">x</button></th>`
data.chars.forEach(c=>{
let t=data.log[c.name+"_"+q.id]
let done=isDone(q,t)
html+=`<td class="${done?'done':'notyet'}" onclick="toggle('${c.name}',${q.id})">${done?'済':'未'}</td>`
})
html+="</tr>"
})

table.innerHTML=html
}

/* 削除 */
function delChar(n){data.chars=data.chars.filter(c=>c.name!==n);save();render()}
function delQuest(id){data.quests=data.quests.filter(q=>q.id!==id);save();render()}

/* Ping */
let pingOn=false,history=[]
const chart=new Chart(chart,{type:'line',data:{labels:[],datasets:[{data:[]}]}})

function togglePing(){pingOn=!pingOn}

setInterval(async()=>{
if(!pingOn)return
let s=performance.now()
await fetch("https://www.google.com/generate_204",{mode:"no-cors"})
let ms=(performance.now()-s)|0
history.push(ms)
if(history.length>120)history.shift()

pingNow.textContent=ms
pingAvg.textContent=(history.reduce((a,b)=>a+b,0)/history.length)|0
pingMax.textContent=Math.max(...history)

chart.data.labels=history.map((_,i)=>i)
chart.data.datasets[0].data=history
chart.update()

},1000)

/* URL */
function exportURL(){
let s=btoa(encodeURIComponent(JSON.stringify(data)))
let url=location.origin+location.pathname+"?d="+s
urlBox.value=url
navigator.clipboard.writeText(url)
}

(function(){
let p=new URLSearchParams(location.search).get("d")
if(p){
data=JSON.parse(decodeURIComponent(atob(p)))
save()
}
})()

render()

</script>

</body>
</html>
