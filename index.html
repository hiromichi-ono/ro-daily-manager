<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RO Daily Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
  --bg:#0b1020;
  --bg-2:#11192e;
  --panel:rgba(20,28,48,.78);
  --panel-solid:#18233d;
  --panel-border:rgba(255,255,255,.08);
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#5b8cff;
  --accent-2:#7c5cff;
  --success:#23c483;
  --danger:#ff5d73;
  --done:rgba(34,197,94,.22);
  --notyet:rgba(239,68,68,.22);
  --shadow:0 10px 30px rgba(0,0,0,.28);
  --radius:16px;
}

body.light{
  --bg:#f3f7ff;
  --bg-2:#e9eef9;
  --panel:rgba(255,255,255,.88);
  --panel-solid:#ffffff;
  --panel-border:rgba(16,24,40,.08);
  --text:#111827;
  --muted:#5b6b87;
  --done:rgba(34,197,94,.18);
  --notyet:rgba(239,68,68,.18);
  --shadow:0 12px 28px rgba(15,23,42,.08);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:"Segoe UI","Yu Gothic UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(91,140,255,.18), transparent 32%),
    radial-gradient(circle at top right, rgba(124,92,255,.18), transparent 28%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
}

button,input,select,textarea{
  font:inherit;
}

button{
  appearance:none;
  border:0;
  cursor:pointer;
}

input,select,textarea{
  width:100%;
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid var(--panel-border);
  border-radius:12px;
  padding:10px 12px;
  outline:none;
}

textarea{
  resize:vertical;
  min-height:90px;
}

input::placeholder{
  color:var(--muted);
}

header{
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  background:rgba(12,18,34,.7);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
}

body.light header{
  background:rgba(255,255,255,.75);
  border-bottom:1px solid rgba(16,24,40,.06);
}

.header-group{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.page{
  max-width:1200px;
  margin:28px auto 40px;
  padding:0 16px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}

.hero h1{
  margin:0;
  font-size:28px;
  font-weight:800;
}

.hero p{
  margin:6px 0 0;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:18px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
  padding:18px;
}

.panel + .panel{
  margin-top:18px;
}

.panel-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:800;
}

.subtle{
  color:var(--muted);
  font-size:13px;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.btn{
  border-radius:12px;
  padding:10px 14px;
  color:#fff;
  font-weight:700;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn:active{
  transform:translateY(0);
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 8px 20px rgba(91,140,255,.35);
}

.btn-secondary{
  background:rgba(255,255,255,.08);
  color:var(--text);
  border:1px solid rgba(255,255,255,.1);
}

.btn-danger{
  background:linear-gradient(135deg,#ff6a7d,#ff4d67);
  box-shadow:0 8px 20px rgba(255,93,115,.28);
}

.btn-icon{
  min-width:42px;
  padding:10px 12px;
}

.timer-box,.clock-box{
  padding:8px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--panel-border);
  font-weight:700;
}

.status-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.04em;
}

.status-chip::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 12px currentColor;
}

.status-chip.on{
  color:#7ef0b5;
  background:rgba(35,196,131,.12);
  border:1px solid rgba(35,196,131,.25);
}

.status-chip.off{
  color:#ff8fa0;
  background:rgba(255,93,115,.12);
  border:1px solid rgba(255,93,115,.25);
}

.tableWrap{
  overflow:auto;
  border-radius:14px;
  border:1px solid var(--panel-border);
}

table{
  border-collapse:collapse;
  width:100%;
  min-width:680px;
  background:rgba(255,255,255,.02);
}

th,td{
  border:1px solid rgba(255,255,255,.08);
  padding:10px 8px;
  text-align:center;
}

body.light th, body.light td{
  border-color:rgba(16,24,40,.08);
}

th{
  background:rgba(255,255,255,.04);
}

.done{
  background:var(--done);
}

.notyet{
  background:var(--notyet);
}

.clickable{
  cursor:pointer;
  user-select:none;
  font-weight:700;
}

.cell-subtext{
  margin-top:4px;
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  line-height:1.2;
}

.cell-subtext-line{
  display:block;
}

.headCell{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.entity-label{
  cursor:context-menu;
  border-radius:10px;
  padding:4px 6px;
}

.entity-label:hover{
  background:rgba(255,255,255,.08);
}

body.light .entity-label:hover{
  background:rgba(91,140,255,.10);
}

.char-col-header{
  transition:opacity .15s ease, box-shadow .15s ease;
}

.char-col-header.dragging{
  opacity:.45;
}

.char-col-header.drag-over-left{
  box-shadow:inset 3px 0 0 var(--accent);
}

.char-col-header.drag-over-right{
  box-shadow:inset -3px 0 0 var(--accent);
}

.quest-row{
  transition:opacity .15s ease, box-shadow .15s ease;
}

.quest-row.dragging{
  opacity:.45;
}

.quest-row.drag-over-top > th,
.quest-row.drag-over-top > td{
  box-shadow:inset 0 3px 0 var(--accent);
}

.quest-row.drag-over-bottom > th,
.quest-row.drag-over-bottom > td{
  box-shadow:inset 0 -3px 0 var(--accent);
}

.quest-drag-handle{
  cursor:grab;
}

.char-drag-handle{
  cursor:grab;
}

.quest-drag-handle:active{
  cursor:grabbing;
}

.char-drag-handle:active{
  cursor:grabbing;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.metric-card{
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}

body.light .metric-card{
  background:linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(244,248,255,.92) 100%);
  border-color:rgba(91,107,135,.16);
}

.metric-label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
}

.metric-value{
  font-size:30px;
  font-weight:900;
  line-height:1;
}

.metric-unit{
  margin-left:4px;
  font-size:13px;
  color:var(--muted);
}

.chart-wrap{
  height:340px;
  padding:12px;
  border-radius:14px;
  background:rgba(8,12,24,.38);
  border:1px solid rgba(255,255,255,.06);
}

body.light .chart-wrap{
  background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(238,244,255,.94) 100%);
  border-color:rgba(91,107,135,.16);
}

#chart{
  width:100% !important;
  height:100% !important;
}

.url-box{
  display:grid;
  gap:10px;
}

.context-menu{
  position:fixed;
  z-index:50;
  min-width:160px;
  display:none;
  padding:8px;
  border-radius:14px;
  background:var(--panel-solid);
  border:1px solid var(--panel-border);
  box-shadow:var(--shadow);
}

.context-menu.open{
  display:grid;
  gap:6px;
}

.context-menu-title{
  padding:6px 8px 8px;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.menu-btn{
  width:100%;
  text-align:left;
  border-radius:10px;
  padding:10px 12px;
  background:transparent;
  color:var(--text);
  border:1px solid transparent;
  font-weight:700;
}

.menu-btn:hover{
  background:rgba(255,255,255,.08);
  border-color:var(--panel-border);
}

body.light .menu-btn:hover{
  background:rgba(91,140,255,.10);
}

.menu-btn-danger{
  color:var(--danger);
}

.context-submenu{
  display:none;
  gap:4px;
  padding:4px;
  border-top:1px solid var(--panel-border);
  margin-top:6px;
}

.context-submenu.open{
  display:grid;
}

.submenu-btn{
  width:100%;
  text-align:left;
  border-radius:10px;
  padding:8px 12px;
  background:transparent;
  color:var(--text);
  border:1px solid transparent;
  font-weight:700;
  font-size:14px;
}

.submenu-btn:hover{
  background:rgba(255,255,255,.08);
  border-color:var(--panel-border);
}

body.light .submenu-btn:hover{
  background:rgba(91,140,255,.10);
}

.time-info-popup{
  display:none;
  position:fixed;
  z-index:40;
  min-width:200px;
  padding:12px;
  border-radius:12px;
  background:var(--panel-solid);
  border:1px solid var(--panel-border);
  box-shadow:var(--shadow);
  font-size:13px;
  line-height:1.6;
  pointer-events:none;
}

.time-info-popup.open{
  display:block;
}

dialog{
  width:min(420px,calc(100vw - 24px));
  padding:18px;
  border-radius:16px;
  border:1px solid var(--panel-border);
  background:var(--panel-solid);
  color:var(--text);
  box-shadow:var(--shadow);
}

dialog::backdrop{
  background:rgba(0,0,0,.45);
}

.dialog-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:800;
}

.dialog-body{
  display:grid;
  gap:10px;
}

.dialog-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:14px;
}

.empty{
  padding:16px;
  text-align:center;
  color:var(--muted);
}

@media (max-width:960px){
  .grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:720px){
  header{
    align-items:flex-start;
    flex-direction:column;
  }

  .hero{
    flex-direction:column;
    align-items:flex-start;
  }

  .metrics{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-group">
    <button id="themeBtn" class="btn btn-secondary btn-icon" type="button">🌙</button>
    <button id="resetSettingsBtn" class="btn btn-secondary" type="button">設定リセット</button>
  </div>

  <div class="header-group">
    <span id="timer" class="timer-box">00:00:00.000</span>
    <button id="startTimerBtn" class="btn btn-primary" type="button">START</button>
    <button id="stopTimerBtn" class="btn btn-secondary" type="button">STOP</button>
    <button id="resetTimerBtn" class="btn btn-secondary" type="button">RESET</button>
  </div>

  <div id="clock" class="clock-box"></div>
</header>

<div class="page">
  <div class="hero">
    <div>
      <h1>RO Daily Manager</h1>
      <p>デイリー管理 / タイマー / Ping Monitor / URL共有</p>
    </div>
    <span id="pingState" class="status-chip off">STOPPED</span>
  </div>

  <div class="grid">
    <div>
      <section class="panel">
        <h2 class="panel-title">デイリー管理</h2>
        <div class="toolbar">
          <button id="openCharBtn" class="btn btn-primary" type="button">キャラ編集</button>
          <button id="openQuestBtn" class="btn btn-secondary" type="button">クエスト編集</button>
        </div>
        <div class="tableWrap">
          <table id="table"></table>
        </div>
      </section>
    </div>

    <div>
      <section class="panel">
        <h2 class="panel-title">Ping Monitor</h2>
        <div class="toolbar">
          <button id="togglePingBtn" class="btn btn-primary" type="button">Ping Monitor ON</button>
          <button id="clearPingBtn" class="btn btn-secondary" type="button">履歴クリア</button>
        </div>

        <div class="metrics">
          <div class="metric-card">
            <div class="metric-label">現在</div>
            <div class="metric-value"><span id="pingNow">--</span><span class="metric-unit">ms</span></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">平均</div>
            <div class="metric-value"><span id="pingAvg">--</span><span class="metric-unit">ms</span></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">最大</div>
            <div class="metric-value"><span id="pingMax">--</span><span class="metric-unit">ms</span></div>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">URL共有</h2>
        <div class="url-box">
          <div class="subtle">現在の状態を URL に埋め込みます。</div>
          <textarea id="urlBox" placeholder="ここに共有URLが表示されます"></textarea>
          <div class="toolbar" style="margin-bottom:0">
            <button id="exportUrlBtn" class="btn btn-primary" type="button">URLを生成してコピー</button>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<dialog id="charDialog">
  <h3 class="dialog-title">キャラ編集</h3>
  <div class="dialog-body">
    <input id="charName" placeholder="キャラ名">
    <input id="charLv" placeholder="Lv">
  </div>
  <div class="dialog-actions">
    <button class="btn btn-secondary" type="button" data-close="charDialog">CANCEL</button>
    <button id="saveCharBtn" class="btn btn-primary" type="button">SAVE</button>
  </div>
</dialog>

<dialog id="questDialog">
  <h3 class="dialog-title">クエスト編集</h3>
  <div class="dialog-body">
    <input id="questName" placeholder="クエスト名">
    <select id="questType">
      <option value="daily">Daily</option>
      <option value="three">3Days</option>
      <option value="weekly">Weekly</option>
    </select>
  </div>
  <div class="dialog-actions">
    <button class="btn btn-secondary" type="button" data-close="questDialog">CANCEL</button>
    <button id="saveQuestBtn" class="btn btn-primary" type="button">SAVE</button>
  </div>
</dialog>

<dialog id="cellTimeEditDialog">
  <h3 class="dialog-title">完了時刻を編集</h3>
  <div class="dialog-body">
    <input id="cellTimeInput" type="datetime-local">
  </div>
  <div class="dialog-actions">
    <button class="btn btn-secondary" type="button" data-close="cellTimeEditDialog">CANCEL</button>
    <button id="saveCellTimeBtn" class="btn btn-primary" type="button">SAVE</button>
  </div>
</dialog>

<div id="contextMenu" class="context-menu" role="menu" aria-hidden="true">
  <div id="contextMenuTitle" class="context-menu-title"></div>
  <button id="renameMenuBtn" class="menu-btn" type="button">名前変更</button>
  <button id="questTypeMenuBtn" class="menu-btn" type="button">クエスト種別変更</button>
  <div id="questTypeSubmenu" class="context-submenu">
    <button class="submenu-btn" type="button" data-type="daily">daily</button>
    <button class="submenu-btn" type="button" data-type="three">three</button>
    <button class="submenu-btn" type="button" data-type="weekly">weekly</button>
  </div>
  <button id="editCellTimeMenuBtn" class="menu-btn" type="button">完了時刻を編集</button>
  <button id="deleteMenuBtn" class="menu-btn menu-btn-danger" type="button">削除</button>
</div>

<div id="timeInfoPopup" class="time-info-popup"></div>

<script>
const $ = (id) => document.getElementById(id);

const themeBtn = $("themeBtn");
const resetSettingsBtn = $("resetSettingsBtn");
const exportUrlBtn = $("exportUrlBtn");
const startTimerBtn = $("startTimerBtn");
const stopTimerBtn = $("stopTimerBtn");
const resetTimerBtn = $("resetTimerBtn");
const openCharBtn = $("openCharBtn");
const openQuestBtn = $("openQuestBtn");
const saveCharBtn = $("saveCharBtn");
const saveQuestBtn = $("saveQuestBtn");
const tableEl = $("table");
const clockEl = $("clock");
const timerEl = $("timer");
const urlBox = $("urlBox");

const charDialog = $("charDialog");
const questDialog = $("questDialog");
const cellTimeEditDialog = $("cellTimeEditDialog");
const charNameEl = $("charName");
const charLvEl = $("charLv");
const questNameEl = $("questName");
const questTypeEl = $("questType");
const contextMenuEl = $("contextMenu");
const contextMenuTitleEl = $("contextMenuTitle");
const renameMenuBtn = $("renameMenuBtn");
const questTypeMenuBtn = $("questTypeMenuBtn");
 const questTypeSubmenuEl = $("questTypeSubmenu");
const editCellTimeMenuBtn = $("editCellTimeMenuBtn");
const deleteMenuBtn = $("deleteMenuBtn");
const timeInfoPopupEl = $("timeInfoPopup");
const cellTimeInputEl = $("cellTimeInput");
const saveCellTimeBtn = $("saveCellTimeBtn");

const togglePingBtn = $("togglePingBtn");
const clearPingBtn = $("clearPingBtn");
const pingNowEl = $("pingNow");
const pingAvgEl = $("pingAvg");
const pingMaxEl = $("pingMax");
const pingStateEl = $("pingState");
const chartCanvas = $("chart");

let data = loadData();
let dragState = null;
let contextTarget = null;
let cellTimeEditTarget = null;

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function resetAppSettings(){
  const ok = confirm("設定と進捗データを初期化します。\nこの操作は元に戻せません。\n実行しますか？");
  if(!ok) return;

  data = { chars: [], quests: [], log: {} };
  localStorage.removeItem("data");
  localStorage.removeItem("theme");

  document.body.classList.remove("light");
  updateThemeButton();

  stopTimer();
  resetTimer();
  stopPing();
  clearPing();

  urlBox.value = "";
  hideContextMenu();
  hideTimeInfoPopup();
  render();
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, (ch) => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[ch]));
}

function normalizeQuestType(type){
  const value = String(type || "").toLowerCase();
  if(value === "daily" || value === "three" || value === "weekly") return value;
  if(["3days", "3day", "three-day", "threedays", "three_days", "3d"].includes(value)) return "three";
  if(["week", "weeklyquest", "weekly_quest"].includes(value)) return "weekly";
  return "daily";
}

function loadData(){
  try{
    const parsed = JSON.parse(localStorage.getItem("data") || '{"chars":[],"quests":[],"log":{}}');
    const normalized = normalizeImportedData(parsed);
    localStorage.setItem("data", JSON.stringify(normalized));
    return normalized;
  }catch(error){
    console.error("Local data parse failed", error);
    return { chars: [], quests: [], log: {} };
  }
}

function hasMeaningfulData(obj){
  if(!obj) return false;
  const chars = Array.isArray(obj.chars) ? obj.chars : [];
  const quests = Array.isArray(obj.quests) ? obj.quests : [];
  const log = obj.log && typeof obj.log === "object" ? obj.log : {};
  return chars.length > 0 || quests.length > 0 || Object.keys(log).length > 0;
}

function normalizeImportedData(raw){
  const safe = {
    chars: Array.isArray(raw?.chars) ? raw.chars : [],
    quests: Array.isArray(raw?.quests) ? raw.quests : [],
    log: raw?.log && typeof raw.log === "object" ? raw.log : {}
  };

  // quest id が数値のものだけ保持
  safe.quests = safe.quests
    .filter((quest) => Number.isFinite(Number(quest?.id)))
    .map((quest) => ({
      id: Number(quest.id),
      name: String(quest.name || ""),
      type: normalizeQuestType(quest.type)
    }));

  safe.chars = safe.chars.map((char) => ({
    name: String(char?.name || ""),
    lv: String(char?.lv || "")
  })).filter((char) => char.name);

  return safe;
}

/* テーマ */
function updateThemeButton(){
  themeBtn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
  updateThemeButton();
}

(function initTheme(){
  const savedTheme = localStorage.getItem("theme");
  if(savedTheme === "light"){
    document.body.classList.add("light");
  }
  updateThemeButton();
})();

/* 時計 */
function drawClock(){
  clockEl.textContent = new Date().toLocaleTimeString();
}
drawClock();
setInterval(drawClock, 1000);

/* タイマー */
let t0 = 0;
let elapsed = 0;
let run = false;

function drawTimer(){
  const ms = elapsed | 0;
  const s = (ms / 1000) | 0;
  timerEl.textContent =
    String((s / 3600) | 0).padStart(2, "0") + ":" +
    String(((s % 3600) / 60) | 0).padStart(2, "0") + ":" +
    String(s % 60).padStart(2, "0") + "." +
    String(ms % 1000).padStart(3, "0");
}

function loop(){
  if(!run) return;
  elapsed = performance.now() - t0;
  drawTimer();
  requestAnimationFrame(loop);
}

function startTimer(){
  if(run) return;
  run = true;
  t0 = performance.now() - elapsed;
  loop();
}

function stopTimer(){
  run = false;
}

function resetTimer(){
  run = false;
  elapsed = 0;
  drawTimer();
}

drawTimer();

/* キャラ */
function saveChar(){
  const name = charNameEl.value.trim();
  const lv = charLvEl.value.trim();

  if(!name){
    alert("キャラ名を入力してください");
    return;
  }

  if(data.chars.find(c => c.name === name)){
    alert("重複");
    return;
  }

  data.chars.push({ name, lv });
  save();
  render();
  closeDialog("charDialog");
}

/* クエスト */
function saveQuest(){
  const name = questNameEl.value.trim();
  const type = questTypeEl.value;

  if(!name){
    alert("クエスト名を入力してください");
    return;
  }

  data.quests.push({ id: Date.now(), name, type });
  save();
  render();
  closeDialog("questDialog");
}

function renameChar(oldName){
  const current = data.chars.find((char) => char.name === oldName);
  if(!current) return;

  const nextName = prompt("新しいキャラ名を入力してください", oldName);
  if(nextName === null) return;

  const trimmedName = nextName.trim();
  if(!trimmedName){
    alert("キャラ名を入力してください");
    return;
  }

  if(trimmedName !== oldName && data.chars.some((char) => char.name === trimmedName)){
    alert("重複");
    return;
  }

  current.name = trimmedName;

  const nextLog = {};
  Object.entries(data.log).forEach(([key, value]) => {
    if(key.startsWith(oldName + "_")){
      nextLog[trimmedName + key.slice(oldName.length)] = value;
    }else{
      nextLog[key] = value;
    }
  });
  data.log = nextLog;

  save();
  render();
}

function renameQuest(id){
  const quest = data.quests.find((item) => item.id === id);
  if(!quest) return;

  const nextName = prompt("新しいクエスト名を入力してください", quest.name);
  if(nextName === null) return;

  const trimmedName = nextName.trim();
  if(!trimmedName){
    alert("クエスト名を入力してください");
    return;
  }

  quest.name = trimmedName;
  save();
  render();
}

function updateQuestType(id, newType){
  const quest = data.quests.find((item) => item.id === id);
  if(!quest) return;

  quest.type = newType;
  save();
  render();
}

/* トグル */
function toggle(charName, questId){
  const key = charName + "_" + questId;
  data.log[key] = data.log[key] ? null : Date.now();
  save();
  render();
}

function moveChar(fromName, toName, placeAfter){
  if(fromName === toName) return;

  const fromIndex = data.chars.findIndex((char) => char.name === fromName);
  const toIndex = data.chars.findIndex((char) => char.name === toName);

  if(fromIndex < 0 || toIndex < 0) return;

  const [movedChar] = data.chars.splice(fromIndex, 1);
  let insertIndex = toIndex;

  if(fromIndex < toIndex){
    insertIndex -= 1;
  }

  if(placeAfter){
    insertIndex += 1;
  }

  data.chars.splice(insertIndex, 0, movedChar);
  save();
  render();
}

function moveQuest(fromId, toId, placeAfter){
  if(fromId === toId) return;

  const fromIndex = data.quests.findIndex((quest) => quest.id === fromId);
  const toIndex = data.quests.findIndex((quest) => quest.id === toId);

  if(fromIndex < 0 || toIndex < 0) return;

  const [movedQuest] = data.quests.splice(fromIndex, 1);
  let insertIndex = toIndex;

  if(fromIndex < toIndex){
    insertIndex -= 1;
  }

  if(placeAfter){
    insertIndex += 1;
  }

  data.quests.splice(insertIndex, 0, movedQuest);
  save();
  render();
}

/* 判定 */
function isDone(q, t){
  if(!t) return false;

  const now = new Date();
  const doneAt = new Date(t);

  if(q.type === "daily"){
    const border = new Date();
    border.setHours(5, 0, 0, 0);
    if(now < border) border.setDate(border.getDate() - 1);
    return doneAt >= border;
  }

  if(q.type === "three"){
    const diff = (now - doneAt) / (1000 * 60 * 60 * 24);
    return diff < 3;
  }

  if(q.type === "weekly"){
    const border = new Date(now);
    const day = border.getDay();
    const diff = (day < 2 ? day + 5 : day - 2);
    border.setDate(border.getDate() - diff);
    border.setHours(12, 0, 0, 0);

    // 火曜12:00より前は、まだ前週期間として扱う
    if(now < border){
      border.setDate(border.getDate() - 7);
    }

    return doneAt >= border;
  }

  return false;
}

function getResetTime(q, completedAt){
  if(!completedAt) return null;

  const doneAt = new Date(completedAt);
  const nextReset = new Date(doneAt);

  if(q.type === "daily"){
    // 済になったタイミング以後のAM5時
    nextReset.setHours(5, 0, 0, 0);
    if(nextReset <= doneAt){
      nextReset.setDate(nextReset.getDate() + 1);
    }
  }else if(q.type === "three"){
    // 済になったタイミング以後の3回目のAM5時
    nextReset.setHours(5, 0, 0, 0);
    if(nextReset <= doneAt){
      nextReset.setDate(nextReset.getDate() + 1);
    }
    // さらに2日空けて3回目のAM5時にする
    nextReset.setDate(nextReset.getDate() + 2);
  }else if(q.type === "weekly"){
    // 済になったタイミング以後の火曜日正午
    const currentDay = nextReset.getDay();
    let daysUntilTuesday = (2 - currentDay + 7) % 7;
    if(daysUntilTuesday === 0){
      // 今日が火曜日の場合、正午以後なら来週の火曜日
      nextReset.setHours(12, 0, 0, 0);
      if(nextReset <= doneAt){
        daysUntilTuesday = 7;
      }
    }
    nextReset.setDate(nextReset.getDate() + daysUntilTuesday);
    nextReset.setHours(12, 0, 0, 0);
  }

  return nextReset.getTime();
}

function autoResetExpired(){
  const now = new Date();
  let changed = false;

  Object.keys(data.log).forEach((key) => {
    const t = data.log[key];
    if(!t) return;

    const parts = key.split("_");
    const questId = Number(parts[parts.length - 1]);
    const q = data.quests.find((item) => item.id === questId);

    if(!q) return;

    const resetTime = getResetTime(q, t);
    if(resetTime && now.getTime() >= resetTime){
      data.log[key] = null;
      changed = true;
    }
  });

  if(changed){
    save();
    render();
  }
}

setInterval(autoResetExpired, 1000);

function formatDateTime(timestamp){
  const date = new Date(timestamp);
  return date.toLocaleString("ja-JP", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getWeekdayJp(timestamp){
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  return weekdays[new Date(timestamp).getDay()];
}

function toDatetimeLocalValue(timestamp){
  const date = new Date(timestamp);
  const pad = (num) => String(num).padStart(2, "0");
  const year = date.getFullYear();
  const month = pad(date.getMonth() + 1);
  const day = pad(date.getDate());
  const hour = pad(date.getHours());
  const minute = pad(date.getMinutes());
  return `${year}-${month}-${day}T${hour}:${minute}`;
}

/* 描画 */
function render(){
  let html = "<tr><th>クエスト / キャラ</th>";

  data.chars.forEach((c) => {
    html += `
      <th class="char-col-header" data-char-name="${escapeHtml(c.name)}">
        <div class="headCell">
          <button class="btn btn-secondary btn-icon char-drag-handle" type="button" draggable="true" data-name="${escapeHtml(c.name)}" title="ドラッグして並び替え">≡</button>
          <span class="entity-label char-label" data-name="${escapeHtml(c.name)}">${escapeHtml(c.name)}${c.lv ? `(Lv${escapeHtml(c.lv)})` : ""}</span>
        </div>
      </th>
    `;
  });

  html += "</tr>";

  if(!data.quests.length){
    html += `<tr><td colspan="${Math.max(1, data.chars.length + 1)}" class="empty">クエストがありません</td></tr>`;
  }else{
    data.quests.forEach((q) => {
      html += `
        <tr class="quest-row" data-quest-id="${q.id}">
          <th>
            <div class="headCell">
              <button class="btn btn-secondary btn-icon quest-drag-handle" type="button" draggable="true" data-id="${q.id}" title="ドラッグして並び替え">≡</button>
              <span class="entity-label quest-label" data-id="${q.id}">${escapeHtml(q.name)}</span>
            </div>
          </th>
      `;

      if(!data.chars.length){
        html += `<td class="empty">キャラがありません</td>`;
      }else{
        data.chars.forEach((c) => {
          const t = data.log[c.name + "_" + q.id];
          const done = isDone(q, t);
          const resetAtTime = done && t ? getResetTime(q, t) : null;
          let cellText = done ? "済" : "未";

          if(done && q.type === "three" && t && resetAtTime){
            const doneWeekday = getWeekdayJp(t);
            const resetWeekday = getWeekdayJp(resetAtTime);
            cellText = `済<div class="cell-subtext"><span class="cell-subtext-line">実施: ${doneWeekday}</span><span class="cell-subtext-line">次回: ${resetWeekday}</span></div>`;
          }

          html += `
            <td
              class="${done ? "done" : "notyet"} clickable toggle-cell"
              data-char="${escapeHtml(c.name)}"
              data-quest="${q.id}"
              data-completed="${t || ""}"
              data-reset-at="${resetAtTime || ""}"
            >${cellText}</td>
          `;
        });
      }

      html += "</tr>";
    });
  }

  tableEl.innerHTML = html;
}

/* 削除 */
function delChar(name){
  data.chars = data.chars.filter(c => c.name !== name);
  Object.keys(data.log).forEach((key) => {
    if(key.startsWith(name + "_")){
      delete data.log[key];
    }
  });
  save();
  render();
}

function delQuest(id){
  data.quests = data.quests.filter(q => q.id !== id);
  Object.keys(data.log).forEach((key) => {
    if(key.endsWith("_" + id)){
      delete data.log[key];
    }
  });
  save();
  render();
}

tableEl.addEventListener("dragstart", (event) => {
  const charHandle = event.target.closest(".char-drag-handle");
  if(charHandle){
    const header = charHandle.closest(".char-col-header");
    if(!header) return;

    dragState = {
      type: "char",
      id: header.dataset.charName
    };

    clearDragState();
    header.classList.add("dragging");

    if(event.dataTransfer){
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", String(dragState.id));
    }
    return;
  }

  const handle = event.target.closest(".quest-drag-handle");
  if(!handle) return;

  const row = handle.closest(".quest-row");
  if(!row) return;

  dragState = {
    type: "quest",
    id: Number(row.dataset.questId)
  };

  clearDragState();
  row.classList.add("dragging");

  if(event.dataTransfer){
    event.dataTransfer.effectAllowed = "move";
    event.dataTransfer.setData("text/plain", String(dragState.id));
  }
});

tableEl.addEventListener("dragover", (event) => {
  if(dragState?.type === "char"){
    const header = event.target.closest(".char-col-header");
    if(!header) return;

    event.preventDefault();
    clearDragState();

    const isDraggingHeader = header.dataset.charName === dragState.id;
    if(isDraggingHeader){
      header.classList.add("dragging");
      return;
    }

    const rect = header.getBoundingClientRect();
    const placeAfter = event.clientX > rect.left + rect.width / 2;
    header.classList.add(placeAfter ? "drag-over-right" : "drag-over-left");
    return;
  }

  const row = event.target.closest(".quest-row");
  if(!row || dragState?.type !== "quest") return;

  event.preventDefault();
  clearDragState();

  const isDraggingRow = Number(row.dataset.questId) === dragState.id;
  if(isDraggingRow){
    row.classList.add("dragging");
    return;
  }

  const rect = row.getBoundingClientRect();
  const placeAfter = event.clientY > rect.top + rect.height / 2;
  row.classList.add(placeAfter ? "drag-over-bottom" : "drag-over-top");
});

tableEl.addEventListener("drop", (event) => {
  if(dragState?.type === "char"){
    const header = event.target.closest(".char-col-header");
    if(!header) return;

    event.preventDefault();
    const targetCharName = header.dataset.charName;
    const rect = header.getBoundingClientRect();
    const placeAfter = event.clientX > rect.left + rect.width / 2;

    clearDragState();

    if(targetCharName !== dragState.id){
      const fromLabel = dragState.id;
      const toLabel = targetCharName;
      const directionLabel = placeAfter ? "後ろ" : "前";
      if(confirm(`キャラクター「${fromLabel}」を「${toLabel}」の${directionLabel}へ移動しますか？`)){
        moveChar(dragState.id, targetCharName, placeAfter);
      }
    }

    dragState = null;
    return;
  }

  const row = event.target.closest(".quest-row");
  if(!row || dragState?.type !== "quest") return;

  event.preventDefault();
  const targetQuestId = Number(row.dataset.questId);
  const rect = row.getBoundingClientRect();
  const placeAfter = event.clientY > rect.top + rect.height / 2;

  clearDragState();

  if(targetQuestId !== dragState.id){
    const fromQuest = data.quests.find((quest) => quest.id === dragState.id);
    const toQuest = data.quests.find((quest) => quest.id === targetQuestId);
    const directionLabel = placeAfter ? "後ろ" : "前";
    if(fromQuest && toQuest && confirm(`クエスト「${fromQuest.name}」を「${toQuest.name}」の${directionLabel}へ移動しますか？`)){
      moveQuest(dragState.id, targetQuestId, placeAfter);
    }
  }

  dragState = null;
});

tableEl.addEventListener("dragend", () => {
  clearDragState();
  dragState = null;
});

      x: {
        ticks: { color: "#9fb0d0" },
        grid: { color: "rgba(255,255,255,.08)" }
      },
      y: {
        beginAtZero: true,
        ticks: { color: "#9fb0d0" },
        grid: { color: "rgba(255,255,255,.08)" }
      }
    }
  }
});

function updatePingUi(){
  pingStateEl.textContent = pingOn ? "RUNNING" : "STOPPED";
  pingStateEl.classList.toggle("on", pingOn);
  pingStateEl.classList.toggle("off", !pingOn);

  togglePingBtn.textContent = pingOn ? "Ping Monitor OFF" : "Ping Monitor ON";
  togglePingBtn.classList.toggle("btn-danger", pingOn);
  togglePingBtn.classList.toggle("btn-primary", !pingOn);
}

function updatePingStats(){
  if(!history.length){
    pingNowEl.textContent = "--";
    pingAvgEl.textContent = "--";
    pingMaxEl.textContent = "--";
    return;
  }

  const current = history[history.length - 1];
  const avg = Math.round(history.reduce((a, b) => a + b, 0) / history.length);
  const max = Math.max(...history);

  pingNowEl.textContent = current;
  pingAvgEl.textContent = avg;
  pingMaxEl.textContent = max;
}

function refreshPingChart(){
  pingChart.data.labels = history.map((_, i) => String(i + 1));
  pingChart.data.datasets[0].data = [...history];
  pingChart.update();
}

async function samplePing(){
  const start = performance.now();

  try{
    await fetch("https://www.google.com/generate_204?ts=" + Date.now(), {
      mode: "no-cors",
      cache: "no-store"
    });

    const ms = Math.round(performance.now() - start);
    history.push(ms);
    if(history.length > 60) history.shift();

    updatePingStats();
    refreshPingChart();
  }catch(error){
    pingNowEl.textContent = "ERR";
  }
}

function startPing(){
  if(pingOn) return;
  pingOn = true;
  updatePingUi();
  samplePing();
  pingTimer = setInterval(samplePing, 1000);
}

function stopPing(){
  if(!pingOn) return;
  pingOn = false;
  updatePingUi();

  if(pingTimer){
    clearInterval(pingTimer);
    pingTimer = null;
  }
}

function togglePing(){
  if(pingOn){
    stopPing();
  }else{
    startPing();
  }
}

function clearPing(){
  history = [];
  updatePingStats();
  refreshPingChart();
}

updatePingUi();
updatePingStats();

/* URL */
function exportURL(){
  const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
  const url = location.origin + location.pathname + "?d=" + encoded;
  urlBox.value = url;

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url).catch(() => {});
  }
}

(function importURL(){
  const p = new URLSearchParams(location.search).get("d");
  if(!p) return;

  try{
    const importedRaw = JSON.parse(decodeURIComponent(atob(p)));
    const imported = normalizeImportedData(importedRaw);

    if(!hasMeaningfulData(imported)){
      alert("URLデータが空か不正なため読み込みを中止しました");
      return;
    }

    const shouldImport = !hasMeaningfulData(data) || confirm("URLのデータを読み込みますか？\n現在のローカルデータは上書きされます。\nキャンセルで現在データを維持します。");
    if(shouldImport){
      data = imported;
      save();
    }
  }catch(error){
    console.error("URL import failed", error);
  }finally{
    // 二重インポート防止: 読み込み後はURLパラメータを除去
    history.replaceState(null, "", location.origin + location.pathname);
  }
})();

/* イベント */
themeBtn.addEventListener("click", toggleTheme);
resetSettingsBtn.addEventListener("click", resetAppSettings);
exportUrlBtn.addEventListener("click", exportURL);

startTimerBtn.addEventListener("click", startTimer);
stopTimerBtn.addEventListener("click", stopTimer);
resetTimerBtn.addEventListener("click", resetTimer);

openCharBtn.addEventListener("click", openChar);
openQuestBtn.addEventListener("click", openQuest);
saveCharBtn.addEventListener("click", saveChar);
saveQuestBtn.addEventListener("click", saveQuest);

togglePingBtn.addEventListener("click", togglePing);
clearPingBtn.addEventListener("click", clearPing);

document.querySelectorAll("[data-close]").forEach((btn) => {
  btn.addEventListener("click", () => closeDialog(btn.dataset.close));
});

render();
</script>
